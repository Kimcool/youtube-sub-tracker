<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 480px; height: 600px; overflow: hidden; }
        body { font-family: -apple-system, 'Helvetica Neue', system-ui, sans-serif; display: flex; flex-direction: column; transition: background 0.3s, color 0.3s; }

        /* Themes */
        body.t-dark { --bg: #0a0a0a; --card: #141414; --card-h: #1c1c1c; --border: #1e1e1e; --text: #ddd; --sub: #777; --accent: #e33; --tag-bg: rgba(230,50,50,0.08); --input-bg: #111; --day0: rgba(76,175,80,0.08); --day1: rgba(255,193,7,0.06); --day2: transparent; }
        body.t-midnight { --bg: #0d1117; --card: #161b22; --card-h: #1c2333; --border: #21262d; --text: #c9d1d9; --sub: #6e7681; --accent: #58a6ff; --tag-bg: rgba(88,166,255,0.1); --input-bg: #0d1117; --day0: rgba(88,166,255,0.08); --day1: rgba(88,166,255,0.04); --day2: transparent; }
        body.t-light { --bg: #fafafa; --card: #fff; --card-h: #f0f0f0; --border: #e0e0e0; --text: #1a1a1a; --sub: #888; --accent: #e33; --tag-bg: rgba(230,50,50,0.06); --input-bg: #fff; --day0: rgba(76,175,80,0.07); --day1: rgba(255,152,0,0.05); --day2: transparent; }
        body.t-mocha { --bg: #1e1e2e; --card: #24243a; --card-h: #2a2a42; --border: #313148; --text: #cdd6f4; --sub: #6c7086; --accent: #f5c2e7; --tag-bg: rgba(245,194,231,0.1); --input-bg: #1e1e2e; --day0: rgba(166,227,161,0.08); --day1: rgba(249,226,175,0.06); --day2: transparent; }
        body.t-nord { --bg: #2e3440; --card: #3b4252; --card-h: #434c5e; --border: #434c5e; --text: #eceff4; --sub: #81a1c1; --accent: #88c0d0; --tag-bg: rgba(136,192,208,0.1); --input-bg: #2e3440; --day0: rgba(163,190,140,0.1); --day1: rgba(235,203,139,0.07); --day2: transparent; }
        body { background: var(--bg); color: var(--text); }

        /* Tabs */
        .tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: var(--sub); font-size: 14px; font-weight: 500; transition: all 0.15s; border-bottom: 2px solid transparent; user-select: none; }
        .tab.on { color: var(--text); border-bottom-color: var(--accent); }
        .tab:hover { color: var(--text); }

        .panel { display: none; flex: 1; min-height: 0; overflow-y: auto; }
        .panel.on { display: block; }

        /* Video list */
        .info { padding: 10px 14px; color: var(--sub); font-size: 13px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 1; border-bottom: 1px solid var(--border); }
        .info button { background: none; border: 1px solid var(--border); color: var(--sub); padding: 5px 14px; border-radius: 14px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
        .info button:hover { color: var(--text); border-color: var(--accent); }

        .vlist { padding: 0 6px 8px; }
        .vitem { display: block; padding: 12px 10px; border-bottom: 1px solid var(--border); text-decoration: none; color: inherit; transition: all 0.12s; border-radius: 8px; margin: 2px 0; }
        .vitem:hover { background: var(--card-h); }
        .vitem:last-child { border-bottom: none; }
        .vitem.day-today { background: var(--day0); }
        .vitem.day-today:hover { background: var(--card-h); }
        .vitem.day-yesterday { background: var(--day1); }
        .vitem.day-yesterday:hover { background: var(--card-h); }

        .day-divider { padding: 6px 12px 4px; font-size: 11px; color: var(--sub); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; position: sticky; top: 42px; background: var(--bg); z-index: 1; }

        .vtitle { font-size: 14px; line-height: 1.5; font-weight: 500; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .vmeta { display: flex; align-items: center; gap: 8px; }
        .vch { font-size: 12px; color: var(--accent); background: var(--tag-bg); padding: 3px 10px; border-radius: 10px; white-space: nowrap; font-weight: 500; }
        .vtime { font-size: 12px; color: var(--sub); margin-left: auto; white-space: nowrap; }

        .empty { text-align: center; padding: 40px 20px; color: var(--sub); font-size: 14px; }

        /* Settings & Manage */
        .settings { padding: 16px; }
        .section { margin-bottom: 20px; }
        .section-title { font-size: 12px; color: var(--sub); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; font-weight: 600; }

        .theme-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .theme-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px 4px; border-radius: 10px; cursor: pointer; border: 2px solid var(--border); background: none; transition: all 0.15s; }
        .theme-btn:hover { border-color: var(--sub); }
        .theme-btn.on { border-color: var(--accent); }
        .theme-dot { width: 28px; height: 28px; border-radius: 50%; position: relative; overflow: hidden; }
        .theme-dot::after { content: ''; position: absolute; right: 0; top: 0; width: 50%; height: 100%; }
        .theme-btn span { font-size: 11px; color: var(--sub); white-space: nowrap; }
        .td-dark { background: #0a0a0a; } .td-dark::after { background: #e33; }
        .td-midnight { background: #0d1117; } .td-midnight::after { background: #58a6ff; }
        .td-light { background: #fafafa; border: 1px solid #ddd; } .td-light::after { background: #e33; }
        .td-mocha { background: #1e1e2e; } .td-mocha::after { background: #f5c2e7; }
        .td-nord { background: #2e3440; } .td-nord::after { background: #88c0d0; }

        .opt-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .opt-row label { font-size: 14px; }
        .opt-row select { background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 13px; cursor: pointer; }
        .opt-row select:focus { outline: none; border-color: var(--accent); }

        .add-row { display: flex; gap: 6px; margin-bottom: 8px; }
        .add-row input { flex: 1; padding: 9px 12px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; transition: border 0.15s; }
        .add-row input:focus { outline: none; border-color: var(--accent); }
        .add-row button { padding: 0 16px; background: var(--accent); border: none; color: #fff; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; }
        .add-row button:disabled { opacity: 0.4; }

        .batch-toggle { font-size: 13px; color: var(--accent); cursor: pointer; background: none; border: none; padding: 4px 0; margin-bottom: 8px; }
        .batch-toggle:hover { text-decoration: underline; }
        .batch-area { display: none; margin-bottom: 10px; }
        .batch-area.on { display: block; }
        .batch-area textarea { width: 100%; height: 120px; padding: 10px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 13px; resize: vertical; line-height: 1.6; }
        .batch-area textarea:focus { outline: none; border-color: var(--accent); }
        .batch-area .hint { font-size: 12px; color: var(--sub); margin: 6px 0; }
        .batch-area button { margin-top: 6px; padding: 7px 16px; background: var(--accent); border: none; color: #fff; border-radius: 10px; cursor: pointer; font-size: 13px; }

        .ch-count { font-size: 13px; color: var(--sub); margin: 10px 0 8px; }
        .chitem { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }
        .chitem span { font-size: 14px; }
        .chitem button { background: none; border: none; color: #f44; cursor: pointer; font-size: 12px; padding: 3px 8px; opacity: 0.6; transition: opacity 0.15s; }
        .chitem button:hover { opacity: 1; }
        .status-msg { font-size: 13px; padding: 6px 0; }
        .status-msg.err { color: #f44; }
        .status-msg.ok { color: #4c4; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body class="t-light">
    <div class="tabs">
        <div class="tab on" data-tab="videos" data-i18n="tab_videos">📺 更新</div>
        <div class="tab" data-tab="channels" data-i18n="tab_channels">📋 频道</div>
        <div class="tab" data-tab="settings" data-i18n="tab_settings">⚙ 设置</div>
    </div>

    <div class="panel on" id="p-videos">
        <div class="info">
            <span id="info"></span>
            <button id="refreshBtn" data-i18n="refresh">↻ 刷新</button>
        </div>
        <div class="vlist" id="vlist"></div>
    </div>

    <div class="panel" id="p-channels">
        <div class="settings">
            <div>
                <div class="add-row">
                    <input id="urlIn" placeholder="粘贴 YouTube 频道链接...">
                    <button id="addBtn" data-i18n="add">添加</button>
                </div>
                <button class="batch-toggle" id="batchToggle" data-i18n="batch_add">📦 批量添加</button>
                <div class="batch-area" id="batchArea">
                    <textarea id="batchInput" placeholder="每行一个频道链接..."></textarea>
                    <div class="hint" data-i18n="batch_hint">每行一个链接，最多 50 个</div>
                    <button id="batchBtn" data-i18n="batch_submit">批量添加</button>
                </div>
                <div id="statusMsg"></div>
            </div>
            <div class="ch-count" id="chCount"></div>
            <div id="chList"></div>
        </div>
    </div>

    <div class="panel" id="p-settings">
        <div class="settings">
            <div class="section">
                <div class="section-title" data-i18n="theme_title">主题</div>
                <div class="theme-grid">
                    <button class="theme-btn" data-theme="dark"><div class="theme-dot td-dark"></div><span data-i18n="theme_dark">暗夜</span></button>
                    <button class="theme-btn" data-theme="midnight"><div class="theme-dot td-midnight"></div><span data-i18n="theme_midnight">深蓝</span></button>
                    <button class="theme-btn on" data-theme="light"><div class="theme-dot td-light"></div><span data-i18n="theme_light">亮白</span></button>
                    <button class="theme-btn" data-theme="mocha"><div class="theme-dot td-mocha"></div><span data-i18n="theme_mocha">摩卡</span></button>
                    <button class="theme-btn" data-theme="nord"><div class="theme-dot td-nord"></div><span data-i18n="theme_nord">北极</span></button>
                </div>
            </div>
            <div class="section">
                <div class="section-title" data-i18n="prefs_title">偏好设置</div>
                <div class="opt-row">
                    <label data-i18n="lang_label">语言</label>
                    <select id="langSelect">
                        <option value="zh">中文</option>
                        <option value="en">English</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                    </select>
                </div>
                <div class="opt-row">
                    <label data-i18n="days_label">更新天数</label>
                    <select id="daysSelect">
                        <option value="3">3 天</option>
                        <option value="7">7 天</option>
                        <option value="15">15 天</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
